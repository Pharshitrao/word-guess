<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Word Guess</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="nav-left">
                <button id="btn-hint" class="icon-btn tap-effect" title="Get a Hint" aria-label="Get Hint">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2v1"/><path d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5Z"/><path d="M19 12h1"/><path d="M4 12h1"/><path d="M17 19l1 1"/><path d="M6 19l-1 1"/></svg>
                </button>
            </div>
            
            <div class="header-center">
                <h1 class="logo">Luminary<span class="logo-accent">.</span></h1>
            </div>
            
            <div class="nav-right">
                <button id="btn-stats" class="icon-btn tap-effect" title="Statistics" aria-label="Statistics">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 15v-6"/><path d="M12 15v-4"/><path d="M17 15v-8"/></svg>
                </button>
                <button id="btn-settings" class="icon-btn tap-effect" title="Settings" aria-label="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </header>

        <div class="toast-container" id="toast-container"></div>

        <main class="game-container">
            <div id="board" class="board"></div>
            
            <div id="keyboard" class="keyboard">
                <div class="keyboard-row">
                    <button data-key="Q" class="key">Q</button>
                    <button data-key="W" class="key">W</button>
                    <button data-key="E" class="key">E</button>
                    <button data-key="R" class="key">R</button>
                    <button data-key="T" class="key">T</button>
                    <button data-key="Y" class="key">Y</button>
                    <button data-key="U" class="key">U</button>
                    <button data-key="I" class="key">I</button>
                    <button data-key="O" class="key">O</button>
                    <button data-key="P" class="key">P</button>
                </div>
                <div class="keyboard-row">
                    <div class="spacer half"></div>
                    <button data-key="A" class="key">A</button>
                    <button data-key="S" class="key">S</button>
                    <button data-key="D" class="key">D</button>
                    <button data-key="F" class="key">F</button>
                    <button data-key="G" class="key">G</button>
                    <button data-key="H" class="key">H</button>
                    <button data-key="J" class="key">J</button>
                    <button data-key="K" class="key">K</button>
                    <button data-key="L" class="key">L</button>
                    <div class="spacer half"></div>
                </div>
                <div class="keyboard-row">
                    <button data-key="Enter" class="key wide tap-effect">ENTER</button>
                    <button data-key="Z" class="key">Z</button>
                    <button data-key="X" class="key">X</button>
                    <button data-key="C" class="key">C</button>
                    <button data-key="V" class="key">V</button>
                    <button data-key="B" class="key">B</button>
                    <button data-key="N" class="key">N</button>
                    <button data-key="M" class="key">M</button>
                    <button data-key="Backspace" class="key wide tap-effect">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals for Game Over, Stats, Settings -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <!-- Game Over Modal -->
        <div id="game-over-modal" class="modal hidden">
            <button class="close-btn" aria-label="Close Modal">&times;</button>
            <h2 id="modal-title">You Won!</h2>
            <div class="stats-overview">
                <div class="stat-item">
                    <div class="stat-value" id="stat-attempts">4</div>
                    <div class="stat-label">Guesses</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-word">APPLE</div>
                    <div class="stat-label">Word</div>
                </div>
            </div>
            <button id="play-again" class="btn-primary tap-effect">Play Again</button>
        </div>

        <!-- Stats Modal -->
        <div id="stats-modal" class="modal hidden">
            <button class="close-btn" aria-label="Close Modal">&times;</button>
            <h2>Statistics</h2>
            <div class="stats-overview">
                <div class="stat-item">
                    <div class="stat-value" id="stat-played">0</div>
                    <div class="stat-label">Played</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-win-pct">0</div>
                    <div class="stat-label">Win %</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-streak">0</div>
                    <div class="stat-label">Current<br>Streak</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-max-streak">0</div>
                    <div class="stat-label">Max<br>Streak</div>
                </div>
            </div>
            
            <h3 class="chart-title">Guess Distribution</h3>
            <div class="guess-distribution" id="guess-distribution">
                <!-- Bars will be generated by JS -->
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <button class="close-btn" aria-label="Close Modal">&times;</button>
            <h2>Settings</h2>
            
            <div class="setting-row">
                <div class="setting-info">
                    <div class="setting-title">Hard Mode</div>
                    <div class="setting-desc">Any revealed hints must be used in subsequent guesses</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="hard-mode-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <div class="setting-info">
                    <div class="setting-title">High Contrast Mode</div>
                    <div class="setting-desc">For better color vision</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="high-contrast-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <div class="setting-info">
                    <div class="setting-title">Reset Progress</div>
                    <div class="setting-desc">Erase all statistics and streaks</div>
                </div>
                <button id="reset-stats-btn" class="btn-danger tap-effect">Reset</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
